name: Actualizar README automáticamente

on:
  push:
    paths:
      - '*.pdf'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Generar lista de PDFs en orden alfabético
        run: |
          echo "# 📘 Biblioteca de Libros" > README.md
          echo "" >> README.md
          echo "Este repositorio contiene libros en PDF relacionados con estadística y matemáticas aplicadas." >> README.md
          echo "" >> README.md
          echo "Lista de libros disponibles (orden alfabético):" >> README.md
          for file in $(ls *.pdf | sort); do
            nombre=$(basename "$file")
            echo "- [$nombre]($file)" >> README.md
          done

            - name: Commit cambios
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: actions@github.com
          message: "Actualizar lista de libros automáticamente"

